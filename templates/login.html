{% extends "base.html" %}

{% block title %}{{ t('login') }} - HealthCare Chatbot{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <div class="card">
            <div class="card-header" style="justify-content: center;">
                <i class="fas fa-sign-in-alt" style="font-size: 2rem;"></i>
            </div>
            <h2 class="text-center mb-2">{{ t('login') }}</h2>
            <p class="text-center" style="color: var(--gray-600); margin-bottom: 1.5rem;">
                Welcome back! Please login to your account.
            </p>
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label class="form-label">{{ t('username') }}</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                </div>
                
                <div class="form-group">
                    <label class="form-label">{{ t('password') }}</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                </div>
                
                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem;">
                    <input type="checkbox" name="remember" id="remember" style="width: auto;">
                    <label for="remember" style="margin-bottom: 0; font-weight: normal;">Remember me</label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> {{ t('login') }}
                </button>
            </form>
            
            <div class="text-center mt-3">
                <p style="color: var(--gray-600);">
                    Don't have an account? 
                    <a href="{{ url_for('register') }}" style="color: var(--primary-color); font-weight: 600;">Register here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
